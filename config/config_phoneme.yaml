data:
    name: timit
    exp_name: info_phoneme
    window_type: hamming
    win_size: 400
    hop_size: 160
    num_ceps: 13
    num_mel_bins: 26
    raw_dir: raw
    features_dir: features
    train_data: metadata/train_data.csv
    test_data: metadata/test_data.csv
    core_train: splits/core_train.csv
    core_test: splits/core_test.csv
    core_val: splits/core_val.csv
    target_column: phonemes
    tokenizer: token
    # Applies TIMIT 61-to-39 merges, maps silence/closures to sil, and drops q.
    target_normalization: timit_39
    transcriptions_dir: outputs_phoneme
    
model:
    max_length: 150
    num_features: 26
    enc:
        type: lstm
        hidden_size: 128
        num_layers: 1
        bidirectional: True
        dropout: 0.1
    dec:
        type: lstm
        embedding_size: 39
        hidden_size: 128
        num_layers: 1
        dropout: 0
    joint:
        type: additive
        hidden_size: 40
        activation:
        dropout: 0.0
    decode:
        method: greedy
        beam_width: 5
training:
    seed: 1942
    batch_size: 1
    bucket_by_duration: True
    bucket_size_multiplier: 100
    sort_eval_by_duration: True
    epochs: 100
    max_grad_norm: 100
    weight_noise_std: 0.075
    progress_logs_per_epoch: 5
    eval_every: 5
    save_every: 20
    train_cer_samples: 256
    load_model:
    evaluate: True
    early_stopping: True
    early_stopping_patience: 5
    early_stopping_min_cer_delta: 0.0
    restore_best_model: True
    export_transcriptions_after_training: True
    export_decode_methods:
        - greedy

wandb:
    enabled: True
    project: rnn-transducer
    entity:
    name:
    mode: online

optim:
    type: adamw
    lr: 0.0001
    weight_decay: 0.01
    betas: "(0.9,0.999)"
    eps: 1.0e-8
    fused: False
    scheduler: reduce_on_plateau
    min_lr: 0.00001
    plateau_factor: 0.5
    plateau_patience: 2
    plateau_threshold: 0.0001
    begin_to_adjust_lr: 5
    adjust_every: 5
    decay_ratio: 0.9
    momentum: 0.9
    nesterov: False
